AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  SuggestExtensions: false

Metrics/ClassLength:
  Max: 170

Metrics/MethodLength:
  Max: 20

Metrics/BlockLength:
  Max: 90

Metrics/AbcSize:
  Max: 18

Layout/LineLength:
  Max: 170

Layout/HashAlignment:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false
